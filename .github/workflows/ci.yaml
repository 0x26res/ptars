name: "CI"

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Update Rust
        run: |
          rustup update
      - name: Format
        run: cargo fmt && git diff --exit-code
      - name: Lint
        run: |
          rustup component add clippy
          cargo clippy -- -D warnings

  docs:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.1"
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build docs
        run: |
          uv run --python=${{ env.PYTHON_VERSION }} --group=docs mkdocs build --strict

  test:
    strategy:
      matrix:
        python:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    - uses: astral-sh/setup-uv@v7
      with:
        version: "0.11.1"
        python-version: ${{ matrix.python }}


    - name: Install just and grcov
      run: |
        cargo install just grcov

    - name: Build
      run: |
        just develop
        just protoc

    - name: Run coverage
      run: just coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./lcov.info,./coverage.xml
        fail_ci_if_error: true

  # Safeguard: a consumer pinned to a different arrow major version must be
  # able to exchange data with ptars through the Arrow C Data Interface.
  arrow-version-independence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Update Rust
        run: rustup update
      - name: Test against a different arrow major version
        run: cargo test --manifest-path tests/arrow-version-independence/Cargo.toml

  # Safeguard: no arrow or prost types may appear in the public API of the
  # ptars crate, otherwise consumers get pinned to ptars' internal versions.
  public-api-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly toolchain
        run: rustup toolchain install nightly
      - name: Install cargo-public-api
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api
      - name: Check ptars public API for leaked arrow/prost types
        run: |
          # --simplified omits blanket impls (e.g. arrow-buffer's `impl<T> Allocation for T`),
          # which rustdoc attributes to our types but which imply no version coupling.
          cargo public-api -p ptars --simplified > public-api.txt
          cat public-api.txt
          if grep -E '\b(arrow|arrow_array|arrow_schema|arrow_buffer|arrow_data|prost|prost_reflect|prost_types)::' public-api.txt; then
            echo "::error::arrow/prost types leaked into the public API of the ptars crate"
            exit 1
          fi

  all-tests-pass:
    if: always()

    needs:
    - lint
    - docs
    - test
    - arrow-version-independence
    - public-api-check

    runs-on: ubuntu-latest

    steps:
      - name: check test jobs
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
